name: vlog_date
description: SETLOG LOVABLE - 하루로 연결되는 소개팅 앱
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: 6.1.5+1
  shared_preferences: 2.5.3
  hive: 2.2.3
  hive_flutter: 1.1.0
  http: 1.5.0
  intl: 0.19.0
  image_picker: 1.1.2
  video_player: 2.9.2
  camera: 0.11.1
  permission_handler: 11.4.0
  uuid: 4.5.1
  cached_network_image: 3.4.1
  shimmer: 3.0.0
  lottie: 3.3.1
  flutter_animate: 4.5.2
  share_plus: 10.1.4
  path_provider: 2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
