name: vlog_date
description: SETLOG LOVABLE - 매시간 2초 영상으로 연결되는 브이로그 앱
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # 상태 관리
  provider: 6.1.5+1
  # 로컬 저장소
  shared_preferences: 2.5.3
  # 날짜/시간
  intl: 0.19.0
  # 카메라
  camera: 0.11.1
  # 권한 관리
  permission_handler: 11.4.0
  # 고유 ID 생성
  uuid: 4.5.1
  # 공유 기능
  share_plus: 10.1.4
  # 파일 경로
  path_provider: 2.1.5
  # 비디오 재생
  video_player: 2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
